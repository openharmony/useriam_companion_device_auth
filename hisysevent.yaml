domain: COMPANION_AUTH

INTERACTION_EVENT:
  __BASE: {type: FAULT, level: CRITICAL, desc: interaction event, preserve: true}
  REQUEST_TYPE: {type: STRING, desc: request type}
  RESULT: {type: STRING, desc: request result}
  HOST_USER_ID: {type: INT32, desc: host device user ID}
  HOST_DEVICE_KEY: {type: STRING, desc: host device key}
  COMPANION_USER_ID: {type: INT32, desc: companion user ID}
  COMPANION_DEVICE_KEY: {type: STRING, desc: companion device key}
  CONNECTION_NAME: {type: STRING, desc: connection name}
  SCHEDULE_ID: {type: UINT64, desc: schedule ID of this request}
  TRIGGER_REASON: {type: STRING, desc: trigger reason}
  TEMPLATE_ID_LIST: {type: STRING, desc: template ID list}
  EXTRA_INFO: {type: STRING, desc: extra info}

SYSTEM_FAULT:
  __BASE: {type: FAULT, level: CRITICAL, desc: system fault, preserve: true}
  FAULT_TYPE: {type: STRING, desc: fault type}
  FAULT_ID: {type: STRING, desc: fault ID}
  FAULT_INFO: {type: STRING, desc: fault info}